<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando valores</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        input{
            width: 200px;
            height: 30px;
            margin-bottom: 30px;
        }

        #res{
            margin-top: 20px;
            font-size: 1.3em;
        }
    </style>
</head>
<body>

    <h1>Somando valores</h1>
    <input type="number" name="" id="num1"> +
    <input type="number" name="" id="num2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res">Resultado</div>

    <script>
        function somar(){
            var txn1 = document.getElementById ('num1')
            var txn2 = document.getElementById ('num2') 
            var res = document.getElementById ('res')
            var n1 = Number(txn1.value)
            var n2 = Number(txn2.value)
            var s = n1 + n2 
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${s}</strong>`
           
        }

    </script>
    
</body>
</html>
