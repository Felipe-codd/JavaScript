<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>

    <style>
        #area{
            background-color: rgb(0, 112, 0);
            color: white;
            font-size: 1.5em;
            height: 200px;
            width: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="area">

        interaja...
    </div>

    <script>
        var a = document.getElementById('area');
        a.addEventListener('click', clicar);
        a.addEventListener('mouseenter', entrar);
        a.addEventListener('mouseout', sair);

        function clicar(){
            a.innerText = 'Clicou!';
            a.style.backgroundColor = 'red';
        }

        function entrar(){
            a.innerText = 'Entrou!';
        }

        function sair(){
            a.innerText = 'Saiu!';
            a.style.backgroundColor = 'rgb(0, 112, 0)';
        }
    </script>
    
</body>
</html>
