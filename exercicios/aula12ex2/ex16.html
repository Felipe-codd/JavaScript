<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador de idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Verificador de idade</h1>
    </header>

    <section>
        <div>
            <p>Ano de nascimento: 
                <input type="number" name="txtano" id="txtano" min="0">
            </p>
            <p id="gen">
                Sexo:
                <input type="radio" name="radsex" id="masc" checked>
                <label for="radsex">Masculino</label>
                <input type="radio" name="radsex" id="fem" checked>
                <label for="radsex">Feminino</label>
            </p>        
                 
            <button id="button"
            onclick="verificarIdade()">Verificar</button>
            
        </div>
        <div id="res">
            Preencha os dados para ver o resultado!
        </div>
        <div id="foto"> 

        </div>
    </section>
    
    <footer>
        &copy; Felipe Nascimento - 2026
    </footer>

    <script src="script.js"></script>
</body>
</html>
